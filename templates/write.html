<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>외계통신 메시지 작성</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>지구 메시지 작성</h1>
    <form action="/write" method="POST">
        <div class="form-group">
            <label>통신 제목</label><br>
            <input type="text" name="title" required style="width: 100%; padding: 10px;">
        </div>
        <br>
        <div class="form-group">
            <label>통신 내용</label><br>
            <textarea name="content" rows="10" required style="width: 100%; padding: 10px;"></textarea>
        </div>
        <br>
        <button type="submit" class="btn">우주로 전송</button>
        <a href="{{ url_for('index') }}" style="color: #ccc;">취소</a>
    </form>
</body>
</html>
